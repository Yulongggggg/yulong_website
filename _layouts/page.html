---
layout: default
---
<article class="page page--{{ page.slug | default: page.title | slugify }}">
  {% unless page.hide_title %}
    <header class="page-header">
      <p class="page-kicker">{{ page.kicker | default: page.title }}</p>
      <h1 class="page-title">{{ page.heading | default: page.title }}</h1>
      {% if page.description %}
        <p class="page-description">{{ page.description }}</p>
      {% endif %}
    </header>
  {% endunless %}

  {{ content }}
</article>
