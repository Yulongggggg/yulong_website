title: Yulong Liu
tagline: Personal Website
email: yl3825@cornell.edu
description: >-
  Personal website of Yulong Liu, Ph.D. student in Earth and Atmospheric Sciences at Cornell University.
url: https://yulongggggg.github.io
baseurl: /yulong_website
lang: en

author:
  name: Yulong Liu
  email: yl3825@cornell.edu

markdown: kramdown
permalink: pretty

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

exclude:
  - .astro/
  - dist/
  - node_modules/
  - public/
  - src/
  - tmp/
  - yulong_website/
  - _pages/
  - package-lock.json
  - astro.config.mjs
  - tsconfig.json
  - README.md
  - Yulong_CV2026_V2.pdf

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
